appId: com.pdfwatermarkpro.app
productName: PDFWatermark Pro
directories:
  output: dist
files:
  - src/**/*
  - package.json
win:
  target:
    - target: nsis
      arch:
        - x64
  icon: src/renderer/assets/icons/icon.png
nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  installerIcon: src/renderer/assets/icons/icon.png
  uninstallerIcon: src/renderer/assets/icons/icon.png
